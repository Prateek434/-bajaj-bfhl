<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BFHL Hierarchy Explorer | Chitkara Challenge</title>
    <meta
      name="description"
      content="Interactive tool to explore hierarchical node relationships via the BFHL API — Chitkara Full Stack Engineering Challenge"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Animated background -->
    <div class="bg-mesh" aria-hidden="true">
      <div class="mesh-blob blob-1"></div>
      <div class="mesh-blob blob-2"></div>
      <div class="mesh-blob blob-3"></div>
    </div>

    <div class="app-wrapper">
      <!-- ── Header ── -->
      <header class="site-header">
        <div class="header-badge">
          <span class="badge-dot"></span>
          API Live
        </div>
        <h1 class="site-title">
          <span class="title-gradient">BFHL</span> Hierarchy Explorer
        </h1>
        <p class="site-subtitle">
          Chitkara Full Stack Challenge &mdash; Round 1
        </p>
      </header>

      <!-- ── Main Card ── -->
      <main class="main-card" id="main-content">
        <!-- Input section -->
        <section class="input-section" aria-label="Node Input">
          <div class="section-header">
            <div class="section-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
              </svg>
            </div>
            <div>
              <h2 class="section-title">Node Input</h2>
              <p class="section-desc">
                Enter node pairs as <code>A-&gt;B</code>, comma or newline separated
              </p>
            </div>
          </div>

          <div class="textarea-wrapper">
            <textarea
              id="node-input"
              class="node-textarea"
              placeholder='e.g. A->B, A->C, B->D, C->E, E->F'
              rows="5"
              spellcheck="false"
              aria-label="Node pairs input"
            ></textarea>
            <div class="textarea-hint">
              <kbd>Ctrl</kbd>+<kbd>Enter</kbd> to submit
            </div>
          </div>

          <!-- Quick examples -->
          <div class="examples-row">
            <span class="examples-label">Quick Examples:</span>
            <button
              class="example-chip"
              id="example-tree"
              onclick="loadExample('tree')"
              aria-label="Load tree example"
            >
              🌲 Simple Tree
            </button>
            <button
              class="example-chip"
              id="example-cycle"
              onclick="loadExample('cycle')"
              aria-label="Load cycle example"
            >
              🔄 Cycle
            </button>
            <button
              class="example-chip"
              id="example-full"
              onclick="loadExample('full')"
              aria-label="Load full example"
            >
              🔬 Full Demo
            </button>
          </div>

          <button
            id="submit-btn"
            class="submit-btn"
            onclick="submitNodes()"
            aria-label="Analyse nodes"
          >
            <span class="btn-inner">
              <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              Analyse Nodes
            </span>
            <span class="btn-loader" aria-hidden="true"></span>
          </button>
        </section>

        <!-- Divider -->
        <div class="divider" aria-hidden="true">
          <div class="divider-line"></div>
          <div class="divider-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div class="divider-line"></div>
        </div>

        <!-- Results section -->
        <section
          class="results-section"
          id="results-section"
          aria-label="Analysis Results"
          aria-live="polite"
        >
          <div class="results-placeholder" id="results-placeholder">
            <div class="placeholder-icon" aria-hidden="true">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
              </svg>
            </div>
            <p class="placeholder-text">Results will appear here after analysis</p>
          </div>
        </section>
      </main>

      <!-- ── Footer ── -->
      <footer class="site-footer">
        <p>
          Built by
          <strong>Prateek Malhotra</strong> &middot;
          <span class="mono">2311981388</span> &middot; Chitkara University
        </p>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
