<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BFHL Node Analyser</title>
  <meta name="description" content="Analyse hierarchical node relationships - Chitkara Full Stack Challenge"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="page">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-box">BF</div>
          <div>
            <h1 class="logo-title">BFHL Node Analyser</h1>
            <p class="logo-sub">Chitkara Full Stack Challenge — Round 1</p>
          </div>
        </div>
        <span class="live-badge">● Live</span>
      </div>
    </header>

    <!-- Main -->
    <main class="main">

      <!-- Input Card -->
      <div class="card">
        <h2 class="card-title">Enter Node Pairs</h2>
        <p class="card-desc">Type node pairs like <code>A-&gt;B</code>, separated by commas or new lines.</p>

        <textarea
          id="node-input"
          class="textarea"
          placeholder="e.g.  A->B, A->C, B->D, C->E, E->F"
          rows="5"
          spellcheck="false"
        ></textarea>

        <div class="examples">
          <span class="examples-text">Try an example:</span>
          <button class="ex-btn" onclick="loadExample('tree')">Simple Tree</button>
          <button class="ex-btn" onclick="loadExample('cycle')">With Cycle</button>
          <button class="ex-btn" onclick="loadExample('full')">Full Demo</button>
        </div>

        <button class="submit-btn" id="submit-btn" onclick="submitNodes()">
          <span id="btn-text">Analyse</span>
          <span id="btn-loader" class="loader" style="display:none;"></span>
        </button>
      </div>

      <!-- Results -->
      <div id="results-area"></div>

    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Prateek Malhotra &nbsp;·&nbsp; 2311981388 &nbsp;·&nbsp; Chitkara University</p>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
